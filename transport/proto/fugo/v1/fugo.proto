syntax = "proto3";

package fugo.v1;

option go_package = "github.com/sazardev/fugo/transport/proto/fugo/v1;fugov1";

service FugoRender {
  rpc RenderStream(stream ClientEvent) returns (stream RenderPayload);
}

message RenderPayload {
  oneof payload {
    WidgetTree full_tree = 1;
    PatchList patches = 2;
    WindowCommand window = 3;
    HostCommand host = 4;
    OverlayCommand overlay = 5;
  }
}

message PatchList {
  repeated Patch patches = 1;
  uint64 seq_num = 2;
}

message Patch {
  PatchOp op = 1;
  uint32 node_id = 2;
  WidgetNode node = 3;
  bytes props = 4;
  repeated uint32 children = 5;
  uint32 parent_id = 6;
}

enum PatchOp {
  PATCH_CREATE = 0;
  PATCH_UPDATE = 1;
  PATCH_DELETE = 2;
  PATCH_REPLACE = 3;
  PATCH_REORDER = 4;
}

message WidgetTree {
  repeated WidgetNode nodes = 1;
  uint32 root = 2;
}

message WidgetNode {
  uint32 id = 1;
  WidgetType type = 2;
  bytes props = 3;
  repeated uint32 children = 4;
  string key = 5;
}

enum WidgetType {
  TEXT = 0;
  CONTAINER = 1;
  COLUMN = 2;
  CENTER = 3;
  BUTTON = 4;
  ROW = 5;
  STACK = 6;
  EXPANDED = 7;
  PADDING = 8;
  SIZEDBOX = 9;
  IMAGE = 10;
  TEXTFIELD = 11;
  POSITIONED = 12;
  CHECKBOX = 13;
  SWITCH_WIDGET = 14;
  SLIDER = 15;
  LISTVIEW = 16;
  ANIMATEDCONTAINER = 17;
  ICON = 18;
  DIVIDER = 19;
  WRAP = 20;
  GRIDVIEW = 21;
  ANIMATEDOPACITY = 22;
  SCROLLVIEW = 23;
  GESTUREDETECTOR = 24;
  ALIGN = 25;
  RADIO = 26;
  DROPDOWN = 27;
  ANIMATEDPOSITIONED = 28;
  WINDOWDRAGAREA = 29;
  CARD = 30;
  SCAFFOLD = 31;
  FLOATINGACTIONBUTTON = 32;
  LISTTILE = 33;
  CHIP = 34;
  PROGRESS = 35;
  APPBAR = 36;
  NAVIGATIONBAR = 37;
  TABS = 38;
  TOOLTIP = 39;
  BADGE = 40;
  AVATAR = 41;
  SEGMENTEDBUTTON = 42;
  ASPECTRATIO = 43;
  CLIPRRECT = 44;
  FITTEDBOX = 45;
  FLEXIBLE = 46;
  EXPANSIONTILE = 47;
  POPUPMENU = 48;
}

// ButtonVariant selects which Material 3 button widget renders. The Flutter
// client maps these to FilledButton / FilledButton.tonal / OutlinedButton /
// TextButton / ElevatedButton / IconButton respectively.
enum ButtonVariant {
  BUTTON_FILLED = 0;
  BUTTON_FILLED_TONAL = 1;
  BUTTON_OUTLINED = 2;
  BUTTON_TEXT = 3;
  BUTTON_ELEVATED = 4;
  BUTTON_ICON = 5;
}

enum WindowOp {
  WINDOW_SET_TITLE = 0;
  WINDOW_SET_SIZE = 1;
  WINDOW_MINIMIZE = 2;
  WINDOW_MAXIMIZE = 3;
  WINDOW_CENTER = 4;
  WINDOW_FULLSCREEN = 5;
}

// HostOp identifies an out-of-band request to the host OS that the Flutter
// client fulfills on Go's behalf (clipboard access, native file dialogs).
enum HostOp {
  HOST_CLIPBOARD_WRITE = 0;
  HOST_CLIPBOARD_READ = 1;
  HOST_FILE_OPEN = 2;
  HOST_FILE_SAVE = 3;
}

// OverlayOp identifies a transient UI overlay the client shows imperatively
// (Flutter's showSnackBar / showDialog), driven from Go via Context.
enum OverlayOp {
  OVERLAY_SNACKBAR = 0;
  OVERLAY_DIALOG = 1;
  OVERLAY_BOTTOMSHEET = 2;
  OVERLAY_DATE_PICKER = 3;
  OVERLAY_TIME_PICKER = 4;
}

enum MainAxisSize {
  MAIN_MIN = 0;
  MAIN_MAX = 1;
}

enum MainAxisAlignment {
  MAIN_START = 0;
  MAIN_END = 1;
  MAIN_CENTER = 2;
  MAIN_SPACE_BETWEEN = 3;
  MAIN_SPACE_AROUND = 4;
  MAIN_SPACE_EVENLY = 5;
}

enum CrossAxisAlignment {
  CROSS_START = 0;
  CROSS_END = 1;
  CROSS_CENTER = 2;
  CROSS_STRETCH = 3;
}

message TextProps {
  string value = 1;
  double font_size = 2;
  string color = 3;
  int32 font_weight = 4; // numeric weight 100..900 (400 = normal, 700 = bold)
  int32 text_align = 5;  // 0 = left, 1 = center, 2 = right
}

message ButtonProps {
  string label = 1;
  string bg_color = 2;       // explicit override; empty = use the M3 ColorScheme
  double font_size = 3;      // 0 = M3 default
  double border_radius = 4;  // 0 = M3 default shape
  ButtonVariant variant = 5;
  string icon = 6;           // leading icon name; the sole content for BUTTON_ICON
  bool enabled = 7;          // false renders a disabled button (no onPressed)
}

message ContainerProps {
  string bg_color = 1;
  double border_radius = 3;
  // Padding per edge in logical pixels (field 2 was previously a single
  // all-edges value; it now carries the top edge).
  double pad_top = 2;
  double pad_right = 4;
  double pad_bottom = 5;
  double pad_left = 6;
}

message RowProps {
  MainAxisSize main_axis_size = 1;
  MainAxisAlignment main_alignment = 2;
  CrossAxisAlignment cross_alignment = 3;
}

message ColumnProps {
  MainAxisSize main_axis_size = 1;
  MainAxisAlignment main_alignment = 2;
  CrossAxisAlignment cross_alignment = 3;
}

message StackProps {
  int32 fit = 1;
}

message ExpandedProps {
  int32 flex = 1;
}

message PaddingProps {
  double top = 1;
  double right = 2;
  double bottom = 3;
  double left = 4;
}

message SizedBoxProps {
  double width = 1;
  double height = 2;
}

message ImageProps {
  string src = 1;
  double width = 2;
  double height = 3;
  int32 fit = 4;
}

message TextFieldProps {
  string value = 1;
  string placeholder = 2;
  double font_size = 3;
  bool obscure = 4;
}

message PositionedProps {
  double left = 1;
  double top = 2;
  double right = 3;
  double bottom = 4;
  double width = 5;
  double height = 6;
}

message CheckboxProps {
  bool checked = 1;
  string label = 2;
}

message SwitchProps {
  bool value = 1;
}

message SliderProps {
  double value = 1;
  double min = 2;
  double max = 3;
}

message ListViewProps {
  double item_extent = 1;
  int32 scroll_direction = 2;
}

message AnimatedContainerProps {
  string bg_color = 1;
  double padding = 2;
  double border_radius = 3;
  int32 duration_ms = 4;
  string curve = 5;
}

message IconProps {
  string name = 1;
  double size = 2;
  string color = 3;
}

message DividerProps {
  double thickness = 1;
  string color = 2;
}

message WrapProps {
  double spacing = 1;
  double run_spacing = 2;
}

message GridViewProps {
  int32 cross_axis_count = 1;
  double child_aspect_ratio = 2;
}

message AnimatedOpacityProps {
  double opacity = 1;
  int32 duration_ms = 2;
}

message AnimatedPositionedProps {
  double left = 1;
  double top = 2;
  double right = 3;
  double bottom = 4;
  double width = 5;
  double height = 6;
  int32 duration_ms = 7;
  string curve = 8;
}

message ScrollViewProps {
  int32 scroll_direction = 1; // 0 = vertical, 1 = horizontal
}

message AlignProps {
  double x = 1; // -1.0 (start) .. 1.0 (end), horizontal
  double y = 2; // -1.0 (top) .. 1.0 (bottom), vertical
}

message RadioProps {
  string value = 1;
  string group_value = 2;
  string label = 3;
}

message DropdownProps {
  repeated string items = 1;
  string value = 2;
}

message CardProps {
  double elevation = 1;     // 0 = M3 default elevation
  double padding = 2;       // inner padding on all edges; 0 = none
  double border_radius = 3; // 0 = M3 default shape
}

// ScaffoldProps backs a Material Scaffold. Children are, in order: the body
// (always present), then — each only when its flag is set — the app bar, the
// floating action button, the drawer, and the bottom navigation bar.
message ScaffoldProps {
  bool has_app_bar = 2;
  bool has_fab = 3;
  bool has_drawer = 4;
  bool has_bottom_bar = 5;
}

// NavigationBarProps backs a Material 3 NavigationBar. icons and labels are
// parallel arrays — one destination each.
message NavigationBarProps {
  repeated string icons = 1;
  repeated string labels = 2;
  int32 selected_index = 3;
}

// TabsProps backs a TabBar + TabBarView. labels names the tabs; the children
// are the per-tab views, one per label, in order. Tab switching is handled on
// the client (no round-trip to Go).
message TabsProps {
  repeated string labels = 1;
  int32 initial_index = 2;
}

message TooltipProps {
  string message = 1;
}

message BadgeProps {
  string label = 1; // empty = a small dot badge
}

message AvatarProps {
  string text = 1;     // initials, when set
  string icon = 2;     // icon name, used when text is empty
  string bg_color = 3; // empty = the M3 default
  double radius = 4;   // 0 = the M3 default size
}

// SegmentedButtonProps backs a Material 3 SegmentedButton. values and labels are
// parallel arrays; selected is the currently chosen value.
message SegmentedButtonProps {
  repeated string values = 1;
  repeated string labels = 2;
  string selected = 3;
}

message AspectRatioProps {
  double ratio = 1;
}

message ClipRRectProps {
  double radius = 1;
}

message FittedBoxProps {
  // 0 contain, 1 cover, 2 fill, 3 fitWidth, 4 fitHeight, 5 scaleDown, 6 none
  int32 fit = 1;
}

message FlexibleProps {
  int32 flex = 1; // 0 is treated as flex 1
}

message ExpansionTileProps {
  string title = 1;
  string subtitle = 2;
  string leading_icon = 3;
  bool initially_expanded = 4;
}

// PopupMenuProps backs a PopupMenuButton. values and labels are parallel arrays
// — one menu entry each.
message PopupMenuProps {
  string icon = 1;
  repeated string values = 2;
  repeated string labels = 3;
}

// AppBarProps backs a Material AppBar. Children are the leading widget (first,
// when has_leading is set) followed by the action widgets.
message AppBarProps {
  string title = 1;
  bool center_title = 2;
  bool has_leading = 3;
  string bg_color = 4; // empty = the M3 default surface
}

message FabProps {
  string icon = 1;   // icon name (see Icon names)
  string label = 2;  // non-empty renders an extended FAB
  bool mini = 3;
}

message ListTileProps {
  string title = 1;
  string subtitle = 2;
  string leading_icon = 3;
  string trailing_icon = 4;
}

message ChipProps {
  string label = 1;
  bool selected = 2;  // renders a FilterChip when set
  bool deletable = 3; // shows a delete affordance
}

message ProgressProps {
  bool linear = 1;  // false = circular
  double value = 2; // < 0 = indeterminate; 0..1 = determinate
}

// OverlayCommand asks the client to show a transient overlay: a SnackBar
// (message only) or an AlertDialog (title + message, dismissed with OK).
message OverlayCommand {
  OverlayOp op = 1;
  string title = 2;
  string message = 3;
  // Correlates a reply for overlays that return a value (date/time pickers);
  // 0 for fire-and-forget overlays. The client answers with a "host" ClientEvent.
  uint64 request_id = 4;
}

message WindowCommand {
  WindowOp op = 1;
  string title = 2;
  double width = 3;
  double height = 4;
  bool flag = 5; // generic boolean (e.g. fullscreen on/off)
}

// HostCommand is an out-of-band request from Go to the client to use an OS
// service. Requests that expect a reply carry a non-zero request_id; the client
// answers with a ClientEvent whose event_type is "host" and whose node_id is
// the request_id rendered as a decimal string, with the result in event_data.
message HostCommand {
  HostOp op = 1;
  uint64 request_id = 2; // correlates the reply; 0 = fire-and-forget (no reply)
  string text = 3;       // clipboard payload (write) or dialog title (file ops)
  string default_name = 4; // suggested file name for save dialogs
  repeated string extensions = 5; // allowed extensions for file dialogs, no dot (e.g. "txt")
}

message ClientEvent {
  string node_id = 1;
  string event_type = 2;
  bytes event_data = 3;
  uint64 timestamp = 4;
}
