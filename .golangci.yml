version: "2"
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - decorder
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forbidigo
    - gocheckcompilerdirectives
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - loggercheck
    - maintidx
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - usetesting
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - zerologlint
  disable:
    # Disabled deliberately — these conflict with idiomatic framework code:
    - exhaustruct       # widget structs are partially initialized by design
    - wrapcheck         # not every error needs wrapping in this codebase
    - mnd               # UI sizes, durations and color literals are meaningful
    - gochecknoglobals  # the style aliases and the active theme are intentional package state
    - ireturn           # the widget API returns the fg.Widget interface by design
    - testpackage       # internal _test packages intentionally exercise unexported behavior
    - lll               # line length is handled by gofumpt, not gated here
    - wsl_v5            # whitespace-between-statements is too pedantic here
  exclusions:
    paths:
      # Gitignored scratch directory for leetcode practice — not shipped code.
      - leetcode
    rules:
      # A CLI legitimately writes to stdout/stderr and does file I/O on
      # user-supplied paths (scaffolding, packaging).
      - path: cmd/
        linters:
          - forbidigo
          - gosec

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

linters-settings:
  govet:
    enable:
      - fieldalignment
      - nilness
      - shadow
      - unusedwrite
      - appends
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated
  revive:
    rules:
      - name: exported
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: deep-exit
      - name: defer
      - name: dot-imports
      - name: errorf
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: unconditional-recursion
      - name: superfluous-else
      - name: unexported-naming
      - name: useless-break
      - name: waitgroup-by-value
      - name: atomic
      - name: empty-block
      - name: import-alias-naming
      - name: string-of-int
      - name: confusing-results
      - name: confusing-naming
      - name: get-return
      - name: modifies-parameter
      - name: modifies-value-receiver
      - name: range-val-in-closure
      - name: range-val-address
      - name: nested-structs
  staticcheck:
    checks:
      - all
      - -ST1023
  stylecheck:
    checks:
      - all
      - -ST1023

issues:
  exclude-dirs:
    - .git
    - .github
    - .agents
    - .claude
    - vendor
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    colored-line-number:
      path: stdout
run:
  timeout: 5m
