name: "Generate Go protobuf"
description: "Install protoc + the Go plugins and regenerate the Go protobuf bindings, which are gitignored and not committed (see CLAUDE.md > Wire format)."

runs:
  using: "composite"
  steps:
    - name: Install protoc
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install protoc Go plugins
      shell: bash
      # protoc-gen-go is pinned to the google.golang.org/protobuf version in
      # go.mod so the generated code matches the runtime; go-grpc output is
      # runtime-stable across the grpc v1.x line.
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

    - name: Generate Go bindings
      shell: bash
      run: |
        protoc --proto_path=. \
          --go_out=. --go_opt=paths=source_relative \
          --go-grpc_out=. --go-grpc_opt=paths=source_relative \
          transport/proto/fugo/v1/fugo.proto
